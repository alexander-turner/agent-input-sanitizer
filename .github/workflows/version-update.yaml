name: Version update (post-merge)

# After a push to the default branch, publish the GitHub Release for the new
# version when this push advanced package.json's version and the release is
# missing. No git tag is pushed by this workflow — `gh release create` creates
# the tag implicitly at the released commit, so there is no separate tag-push
# step (and no tag-protection PAT dance for it). The pre-merge bump rides in via
# release-prep.yaml; this only adds the release, which never appears as the
# latest commit, so main's visible head stays the real merge/squash commit.

on:
  push:
    branches: [main, master]

concurrency:
  group: version-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version-update:
    name: Publish the merged release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Need HEAD~1 to detect a version change in this push.
          fetch-depth: 2
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc

      - name: Publish the release if the version advanced
        env:
          # gh needs a token for `release view`/`release create`. A PAT lets the
          # implicit tag clear any tag protection; falls back to GITHUB_TOKEN.
          GH_TOKEN: ${{ secrets.TEMPLATE_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/version-update.sh
